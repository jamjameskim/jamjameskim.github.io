<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>큐마켓 설문 참여 마트 분포</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }

  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: #fff; border-bottom: 1px solid #e5e5e5;
    padding: 12px 20px;
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  }
  #header h1 { font-size: 15px; font-weight: 600; color: #1a1a1a; white-space: nowrap; }

  .filter-group { display: flex; align-items: center; gap: 8px; }
  .filter-label { font-size: 12px; color: #999; white-space: nowrap; }
  .filter-btns { display: flex; gap: 4px; }
  .filter-btn {
    font-size: 12px; padding: 4px 10px; border-radius: 999px;
    border: 1px solid #ddd; background: #fff; color: #555;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .filter-btn:hover { border-color: #aaa; }
  .filter-btn.active-all    { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .filter-btn.active-green  { background: #2ECC71; color: #fff; border-color: #27AE60; }
  .filter-btn.active-red    { background: #E74C3C; color: #fff; border-color: #CB4335; }
  .filter-btn.active-near   { background: #2ECC71; color: #fff; border-color: #27AE60; }
  .filter-btn.active-far    { background: #ABABAB; color: #fff; border-color: #888; }

  .divider { width: 1px; height: 28px; background: #eee; flex-shrink: 0; }

  .legend { display: flex; gap: 12px; align-items: center; margin-left: auto; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #666; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-dot.green  { background: #2ECC71; }
  .legend-dot.gray   { background: #ABABAB; }
  .legend-dot.red    { background: #E74C3C; }

  #stats-bar {
    position: fixed; top: 57px; left: 0; right: 0; z-index: 999;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(4px);
    border-bottom: 1px solid #f0f0f0;
    padding: 6px 20px;
    display: flex; gap: 16px; align-items: center;
  }
  .stat-item { font-size: 12px; color: #888; }
  .stat-item strong { color: #1a1a1a; font-weight: 600; }

  #map { position: fixed; top: 93px; left: 0; right: 0; bottom: 0; }

  .marker-pin {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2.5px solid rgba(0,0,0,0.15);
    box-shadow: 0 2px 6px rgba(0,0,0,0.18);
    cursor: pointer; transition: transform 0.15s;
  }
  .marker-pin:hover { transform: scale(1.2); }
  .marker-pin.green  { background: #2ECC71; border-color: #27AE60; }
  .marker-pin.gray   { background: #ABABAB; border-color: #888; }
  .marker-pin.red    { background: #E74C3C; border-color: #CB4335; }

  .zoom-label {
    background: rgba(255,255,255,0.92); border: 1px solid #ddd;
    border-radius: 6px; padding: 3px 7px;
    font-size: 11px; font-weight: 600; color: #222;
    white-space: nowrap; pointer-events: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }

  .leaflet-popup-content-wrapper { border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.14); border: none; padding: 0; }
  .leaflet-popup-content { margin: 0; min-width: 200px; }
  .popup-inner { padding: 14px 16px; }
  .popup-name { font-size: 14px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
  .popup-tags { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; }
  .popup-tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
  .popup-tag.red    { background: #FEE2E2; color: #991B1B; }
  .popup-tag.gray   { background: #F3F4F6; color: #4B5563; }
  .popup-tag.green  { background: #D1FAE5; color: #065F46; }
  .popup-divider { height: 1px; background: #f0f0f0; margin: 8px 0; }
  .popup-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 5px; font-size: 12px; }
  .popup-label { color: #999; min-width: 44px; flex-shrink: 0; }
  .popup-val { color: #333; line-height: 1.5; }
</style>
</head>
<body>

<div id="header">
  <h1>큐마켓 설문 참여 마트 분포</h1>

  <div class="divider"></div>

  <div class="filter-group">
    <span class="filter-label">동의 여부</span>
    <div class="filter-btns">
      <button class="filter-btn active-all" data-group="consent" data-value="all">전체</button>
      <button class="filter-btn" data-group="consent" data-value="agree">동의</button>
      <button class="filter-btn" data-group="consent" data-value="disagree">비동의</button>
    </div>
  </div>

  <div class="filter-group">
    <span class="filter-label">위치</span>
    <div class="filter-btns">
      <button class="filter-btn active-all" data-group="location" data-value="all">전체</button>
      <button class="filter-btn" data-group="location" data-value="near">서울 근교</button>
      <button class="filter-btn" data-group="location" data-value="far">교외</button>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot green"></div>동의 · 서울근교</div>
    <div class="legend-item"><div class="legend-dot gray"></div>동의 · 교외</div>
    <div class="legend-item"><div class="legend-dot red"></div>비동의</div>
  </div>
</div>

<div id="stats-bar">
  <div class="stat-item">표시 중 <strong id="stat-visible">—</strong>개</div>
  <div class="stat-item">동의 <strong id="stat-agree">—</strong>개</div>
  <div class="stat-item">비동의 <strong id="stat-disagree">—</strong>개</div>
  <div class="stat-item">서울근교 <strong id="stat-near">—</strong>개</div>
  <div class="stat-item">교외 <strong id="stat-far">—</strong>개</div>
</div>

<div id="map"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// agree: 동의 여부, near: 서울근교 여부
const marts = [
  { name: '오케이포인트마트 달성점', address: '대구 달성군 유가읍 테크노상업로 120',       travel: '3시간 21분', lat: 35.8394, lon: 128.5217, agree: false, near: false, personName: null },
  { name: '제일식자제마트(부개점)',   address: '인천 부평구 동수로 153',                   travel: '1시간 1분',  lat: 37.4921, lon: 126.7238, agree: false, near: true,  personName: null },
  { name: '하모니마트오창점',        address: '충북 청주시 청원구 오창읍 양청택지로 107',  travel: '2시간 35분', lat: 36.7248, lon: 127.4458, agree: true,  near: false, personName: '김승수' },
  { name: 'OK플러스마트 해운대점',   address: '부산 해운대구 양운로 40 1층',              travel: '3시간 48분', lat: 35.1630, lon: 129.1460, agree: true,  near: false, personName: '이명규' },
  { name: '코끼리마트 광장점',       address: '서울 광진구 아차산로 537-17',              travel: '52분',       lat: 37.5476, lon: 127.0892, agree: true,  near: true,  personName: null },
  { name: '대농식자재마트',          address: '경기도 김포시 통진읍 서암로 140',          travel: '약 1시간 17분', lat: 37.7107, lon: 126.6165, agree: true, near: true,  personName: '황현신' },
  { name: '우리마트 나운점',         address: '전북특별자치도 군산시 축동로 98-2',        travel: '3시간 48분', lat: 35.9560, lon: 126.7140, agree: true,  near: false, personName: '이세영' },
  { name: '하모니마트 포동점',       address: '경기 시흥시 신현로38번길 22',              travel: '1시간 2분',  lat: 37.3968, lon: 126.8033, agree: false, near: true,  personName: null },
  { name: '전주유명마트',            address: '전북 전주시 완산구 서원로 308',            travel: '4시간',      lat: 35.8085, lon: 127.1048, agree: true,  near: false, personName: '최석우' },
  { name: '엘디마트 정읍점',         address: '전북 정읍시 학산로 117-11',               travel: '3시간',      lat: 35.5693, lon: 126.8522, agree: true,  near: false, personName: '김정환' },
  { name: '포켓마켓 마전점',         address: '인천 서구 완정로 43',                     travel: '1시간',      lat: 37.5628, lon: 126.6542, agree: true,  near: true,  personName: null },
  { name: '에스엠마트수완점',        address: '광주 광산구 장덕로95번길 16',              travel: '약 4시간',   lat: 35.2040, lon: 126.8350, agree: true,  near: false, personName: null },
  { name: 'Okplus마트 밀양점',      address: '경남 밀양시 북성로 48',                    travel: '약 3시간',   lat: 35.4940, lon: 128.7455, agree: true,  near: false, personName: '한유진' },
  { name: '하모니마트대소점',        address: '충북 음성군 대소면 오태로 117',            travel: '약 3시간',   lat: 36.8840, lon: 127.5670, agree: false, near: false, personName: null },
  { name: '농가마트 검암점',         address: '인천 서구 한중로 2',                      travel: '50분',       lat: 37.5575, lon: 126.6523, agree: false, near: true,  personName: null },
  { name: '더마트 수영점',           address: '부산 수영구 수영로741번길 27',             travel: '3시간 40분', lat: 35.1570, lon: 129.1089, agree: true,  near: false, personName: '김지훈' },
  { name: '신세계마트 당하점',       address: '인천광역시 서구 청마로51번길 17',          travel: '50분',       lat: 37.5645, lon: 126.6988, agree: true,  near: true,  personName: 'ㄴㄴ' },
  { name: '즐거운마트 부평점',       address: '인천 부평구 길주로494번길 59',             travel: '55분',       lat: 37.5040, lon: 126.7210, agree: true,  near: true,  personName: '황명숙' },
  { name: '썬할인마트',             address: '경기도 부천시 소사구 자유로 18-1',          travel: '42분',       lat: 37.4777, lon: 126.7736, agree: false, near: true,  personName: null },
  { name: '이오마트 파주',           address: '경기 파주시 하우3길 81',                  travel: '약 1시간',   lat: 37.8290, lon: 126.7710, agree: true,  near: true,  personName: null },
  { name: '화곡본마트',             address: '서울특별시 강서구 까치산로4길 3',           travel: '34분',       lat: 37.5407, lon: 126.8499, agree: true,  near: true,  personName: null },
  { name: '와따',                   address: '경기도 광주시 신현동',                    travel: '—',          lat: 37.4003, lon: 127.2531, agree: true,  near: false,  personName: '이정현' },
  { name: '토마토마트금천점',        address: '충북 청주시 상당구 중고개로 279',          travel: '약 3시간',   lat: 36.6413, lon: 127.4901, agree: false, near: false, personName: null },
  { name: '오케이플러스마트 밀양점', address: '경남 밀양시 북성로 48',                   travel: '약 3시간',   lat: 35.4980, lon: 128.7490, agree: false, near: false, personName: null },
  { name: '옥천엘마트',             address: '충청북도 옥천군 옥천읍 금장로 114',         travel: '약 2시간 반', lat: 36.3068, lon: 127.5714, agree: true,  near: false, personName: '서동해' },
  { name: '토마토마트 용암점',       address: '충북 청주시 상당구 낙영로24번길 5',        travel: '약 3시간',   lat: 36.6348, lon: 127.5054, agree: false, near: false, personName: null },
];

// ── 색상 결정 ─────────────────────────────────────────────────────────────
function getColor(mart) {
  if (!mart.agree) return 'red';
  return mart.near ? 'green' : 'gray';
}

// ── 지도 초기화 ───────────────────────────────────────────────────────────
const LABEL_ZOOM = 12;

const map = L.map('map', { zoomControl: true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

// ── 마커 생성 ─────────────────────────────────────────────────────────────
function makeMarkerIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div class="marker-pin ${color}"></div>`,
    iconSize: [26, 26], iconAnchor: [13, 13], popupAnchor: [0, -15]
  });
}

function makeLabelIcon(name) {
  return L.divIcon({
    className: '',
    html: `<div class="zoom-label">${name}</div>`,
    iconAnchor: [-14, 8], iconSize: null
  });
}

function makePopup(mart) {
  const color = getColor(mart);
  const tagLabel = !mart.agree ? '인터뷰 비동의' : mart.near ? '동의 · 서울근교' : '동의 · 교외';
  const addr   = (mart.address && mart.address !== '—') ? mart.address : '주소 미확인';
  const travel = (mart.travel  && mart.travel  !== '—') ? mart.travel  : '정보 없음';
  const nameRow = mart.personName
    ? `<div class="popup-row"><span class="popup-label">성함</span><span class="popup-val">${mart.personName}</span></div>`
    : '';
  return `
    <div class="popup-inner">
      <div class="popup-name">${mart.name}</div>
      <div class="popup-tags"><span class="popup-tag ${color}">${tagLabel}</span></div>
      <div class="popup-divider"></div>
      <div class="popup-row"><span class="popup-label">주소</span><span class="popup-val">${addr}</span></div>
      <div class="popup-row"><span class="popup-label">소요시간</span><span class="popup-val">${travel}</span></div>
      ${nameRow}
    </div>`;
}

const markerObjects = marts.map(mart => {
  const color = getColor(mart);
  const marker = L.marker([mart.lat, mart.lon], { icon: makeMarkerIcon(color) })
    .bindPopup(makePopup(mart), { maxWidth: 260 });
  const label = L.marker([mart.lat, mart.lon], {
    icon: makeLabelIcon(mart.name), interactive: false, zIndexOffset: -100
  });
  return { mart, marker, label, visible: true };
});

markerObjects.forEach(({ marker }) => marker.addTo(map));

// ── 줌 레이블 ─────────────────────────────────────────────────────────────
function updateLabels() {
  const zoom = map.getZoom();
  markerObjects.forEach(({ marker, label, visible }) => {
    if (visible && zoom >= LABEL_ZOOM) {
      if (!map.hasLayer(label)) label.addTo(map);
    } else {
      if (map.hasLayer(label)) map.removeLayer(label);
    }
  });
}
map.on('zoomend', updateLabels);

// ── 필터 ─────────────────────────────────────────────────────────────────
let filterConsent  = 'all';
let filterLocation = 'all';

function applyFilters() {
  let visible = 0;

  markerObjects.forEach(obj => {
    const { mart, marker, label } = obj;
    const consentMatch =
      filterConsent === 'all' ||
      (filterConsent === 'agree'    &&  mart.agree) ||
      (filterConsent === 'disagree' && !mart.agree);
    const locationMatch =
      filterLocation === 'all' ||
      (filterLocation === 'near' &&  mart.near) ||
      (filterLocation === 'far'  && !mart.near);

    const show = consentMatch && locationMatch;
    obj.visible = show;

    if (show) { if (!map.hasLayer(marker)) marker.addTo(map); visible++; }
    else       { if (map.hasLayer(marker))  map.removeLayer(marker); }

    if (map.hasLayer(label)) map.removeLayer(label);
  });

  updateLabels();
  updateStats(visible);
}

function updateStats(visible) {
  const visibleMarts = markerObjects.filter(o => o.visible).map(o => o.mart);
  document.getElementById('stat-visible').textContent  = visible;
  document.getElementById('stat-agree').textContent    = visibleMarts.filter(m =>  m.agree).length;
  document.getElementById('stat-disagree').textContent = visibleMarts.filter(m => !m.agree).length;
  document.getElementById('stat-near').textContent     = visibleMarts.filter(m =>  m.near).length;
  document.getElementById('stat-far').textContent      = visibleMarts.filter(m => !m.near).length;
}

// ── 버튼 이벤트 ───────────────────────────────────────────────────────────
const activeClassMap = {
  consent:  { all: 'active-all', agree: 'active-green', disagree: 'active-red' },
  location: { all: 'active-all', near: 'active-near',   far: 'active-far' },
};

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const group = btn.dataset.group;
    const value = btn.dataset.value;

    document.querySelectorAll(`.filter-btn[data-group="${group}"]`).forEach(b => {
      b.className = 'filter-btn';
    });
    btn.classList.add(activeClassMap[group][value]);

    if (group === 'consent')  filterConsent  = value;
    if (group === 'location') filterLocation = value;

    applyFilters();
  });
});

// ── 초기화 ────────────────────────────────────────────────────────────────
map.fitBounds(L.latLngBounds(marts.map(m => [m.lat, m.lon])), { padding: [50, 50] });
applyFilters();
</script>
</body>
</html>
